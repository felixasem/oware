# Render Blueprint — hosts the WHOLE Oware game on Render.
#
#   oware-server : Node Web Service (Express + Socket.io)  → multiplayer backend
#   oware-web    : Static Site (Next.js export)            → the game frontend
#
# Deploy: Render dashboard → New → Blueprint → pick the "oware" GitHub repo →
# Apply. Render reads this file and creates BOTH services, wired together.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Multiplayer backend ────────────────────────────────────────────────────
  - type: web
    name: oware-server
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # CORS locked to the frontend's URL. Hardcoded (not fromService) to avoid
      # a circular dependency that left the value unresolved on first sync.
      - key: FRONTEND_URL
        value: https://oware-web.onrender.com

  # ── Frontend (static Next.js export) ───────────────────────────────────────
  - type: web
    name: oware-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: out
    autoDeploy: true
    # SPA fallback so client routes resolve to index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Backend URL baked into the static build. Hardcoded (not fromService) so
      # it resolves at build time without a circular dependency.
      - key: NEXT_PUBLIC_SERVER_URL
        value: https://oware-server.onrender.com
      - key: NEXT_PUBLIC_ENABLE_MULTIPLAYER
        value: "true"
