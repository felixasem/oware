name: Keep backend awake

# Render's free web service spins down after ~15 min of inactivity, adding a
# ~50s cold start to the next request. This workflow pings the health endpoint
# every 10 minutes to keep oware-server warm so multiplayer connects instantly.
#
# Note: GitHub disables scheduled workflows after 60 days with no repo activity
# — just re-enable it from the Actions tab if that happens.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging oware-server health endpoint…"
          curl -sS --max-time 90 https://oware-server.onrender.com/health || true
